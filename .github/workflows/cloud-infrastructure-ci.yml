name: Coaching Context CI

on:
  push:
    branches: [ 'feature/**' ]
    paths:
      - 'cloud-infrastructure-common/**'
      - 'domain-core/**'
      - 'pom.xml'
  pull_request:
    branches: [ develop, master ]
    paths:
      - 'cloud-infrastructure-common/**'
      - 'domain-core/**'
      - 'pom.xml'

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  call-ci-workflow:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      module_name: 'cloud-infrastructure-common'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}