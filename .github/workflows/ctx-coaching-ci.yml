name: Coaching Context CI

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'backend/ctx-coaching/**'
      - 'backend/aws-cloud-adapter/**'
      - 'backend/domain-core/**'
      - 'backend/domain-application/**'
      - 'backend/pom.xml'
  pull_request:
    branches: [ develop, master ]
    paths:
      - 'backend/ctx-coaching/**'
      - 'backend/aws-cloud-adapter/**'
      - 'backend/domain-core/**'
      - 'backend/domain-application/**'
      - 'backend/pom.xml'

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  call-ci-workflow:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      module_name: 'ctx-coaching'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}