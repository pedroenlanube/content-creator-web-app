name: Content Context CI

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'backend/ctx-content/**'
      - 'backend/cloud-infrastructure-common/**'
      - 'backend/domain-core/**'
      - 'backend/pom.xml'
  pull_request:
    branches: [ develop, master ]
    paths:
      - 'backend/ctx-content/**'
      - 'backend/cloud-infrastructure-common/**'
      - 'backend/domain-core/**'
      - 'backend/pom.xml'

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  call-ci-workflow:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      module_name: 'ctx-content'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}