name: Reusable CI Workflow

on:
  workflow_call:
    inputs:
      module_name:
        description: 'Module name to build, test and analyze'
        required: true
        type: string
    # We explicitly request the SONAR_TOKEN from the caller workflow
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # Required by SonarQube for PR decoration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disable SonarQube cross-commit analysis

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, Test, Check Coverage and Analyze with SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # -pl specifies the module to build
        # -am forces Maven to also build required dependencies (e.g., domain-core)
        # verify phase triggers JaCoCo coverage rules automatically
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -pl ${{ inputs.module_name }} -am \
            -Dsonar.projectKey=serverless-back_${{ inputs.module_name }} \
            -Dsonar.projectName="${{ inputs.module_name }}"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports-${{ inputs.module_name }}
          path: '${{ inputs.module_name }}/target/surefire-reports'